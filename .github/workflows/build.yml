name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # ✅ ينصح باستخدام v4 أيضًا
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4  # ✅ v4 أفضل
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3  # ✅ هذا لا يزال يعمل بشكل جيد
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4  # ✅ غيرنا من v3 إلى v4 هنا
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk